name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:        # allow manual re-runs from the Actions tab

permissions:
  contents: read

jobs:
  # Offline unit suite across the supported Python range (matches pyproject's
  # requires-python = ">=3.9"). No network: every test uses fixtures/stubs.
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt covers the monitor + web extras, so the webui tests
          # actually exercise Flask/ruamel rather than being skipped.
          pip install -r requirements.txt
      - name: Run offline tests
        run: python test_weather_mqtt.py

  # End-to-end check that the real installer brings up Mosquitto and both
  # services on a clean Ubuntu VM, the broker round-trips a message, and the
  # dashboard responds. GitHub's ubuntu runners ship systemd, so the systemd
  # units start for real.
  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh (non-interactive -> copies the example config)
        run: sudo SETUP_MOSQUITTO=1 ./install.sh

      - name: Mosquitto and services are active
        run: |
          systemctl is-active --quiet mosquitto       || { echo "mosquitto not active"; exit 1; }
          systemctl is-active --quiet weather-mqtt     || { echo "weather-mqtt not active"; exit 1; }
          systemctl is-active --quiet weather-webui    || { echo "weather-webui not active"; exit 1; }

      - name: Broker round-trips a message
        run: |
          sudo apt-get install -y -qq mosquitto-clients
          mosquitto_sub -h localhost -t 'smoke/test' -C 1 -W 10 > /tmp/sub.out &
          SUB=$!
          sleep 1
          mosquitto_pub -h localhost -t 'smoke/test' -m 'ok'
          wait $SUB
          grep -q ok /tmp/sub.out || { echo "broker did not round-trip"; exit 1; }

      - name: Dashboard responds (/healthz)
        run: |
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8080/healthz -o /tmp/healthz.json; then
              cat /tmp/healthz.json; echo; exit 0
            fi
            sleep 2
          done
          echo "dashboard /healthz did not respond in time"
          exit 1

      # The installer's core promise: re-running over a live install keeps the
      # config byte-for-byte and leaves everything running (on the new code).
      - name: Re-run install.sh over the live install (idempotency)
        run: |
          sudo md5sum /opt/weather-mqtt/config.yaml | sudo tee /tmp/cfg.md5
          sudo SETUP_MOSQUITTO=1 ./install.sh
          sudo md5sum -c /tmp/cfg.md5 || { echo "re-install changed config.yaml"; exit 1; }

      - name: Services still healthy after the re-install
        run: |
          systemctl is-active --quiet mosquitto       || { echo "mosquitto not active"; exit 1; }
          systemctl is-active --quiet weather-mqtt     || { echo "weather-mqtt not active"; exit 1; }
          systemctl is-active --quiet weather-webui    || { echo "weather-webui not active"; exit 1; }
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:8080/healthz -o /tmp/healthz2.json; then
              cat /tmp/healthz2.json; echo; exit 0
            fi
            sleep 2
          done
          echo "dashboard /healthz did not respond after re-install"
          exit 1

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== weather-mqtt ====="; sudo journalctl -u weather-mqtt --no-pager -n 80 || true
          echo "===== weather-webui ====="; sudo journalctl -u weather-webui --no-pager -n 80 || true
          echo "===== mosquitto ====="; sudo journalctl -u mosquitto --no-pager -n 40 || true
